<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard Test</title>
<style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
  background-color: #f5f5f5;
}
.test-section {
  background: white;
  padding: 20px;
  margin: 10px 0;
  border-radius: 5px;
  border-left: 4px solid #667eea;
}
.error {
  color: #c53030;
  background-color: #fff5f5;
}
.success {
  color: #22543d;
  background-color: #f0fff4;
}
</style>
</head>
<body>
<h1>Dashboard Diagnostic Test</h1>

<div class="test-section">
<h3>1. Basic HTML Loading</h3>
<p>✓ HTML is loading correctly</p>
</div>

<div class="test-section">
<h3>2. Configuration Test</h3>
<div id="configTest">Loading...</div>
</div>

<div class="test-section">
<h3>3. DOM Ready Test</h3>
<div id="domTest">Waiting for DOM...</div>
</div>

<div class="test-section">
<h3>4. API Client Test</h3>
<div id="apiTest">Loading...</div>
</div>

<div class="test-section">
<h3>5. Dashboard Initialization</h3>
<div id="dashboardTest">Loading...</div>
</div>

<div class="test-section">
<h3>6. Console Output</h3>
<div id="console-output" style="background-color: #000; color: #0f0; padding: 10px; font-family: monospace; overflow-y: auto; max-height: 300px;">
</div>
</div>

<script>
// capture console output
const originalLog = console.log;
const originalError = console.error;
const consoleOutput = document.getElementById('console-output');

function addToConsole(msg, isError = false) {
  const line = document.createElement('div');
  line.style.color = isError ? '#ff6b6b' : '#0f0';
  line.textContent = (isError ? '[ERROR] ' : '[LOG] ') + msg;
  consoleOutput.appendChild(line);
  consoleOutput.scrollTop = consoleOutput.scrollHeight;
}

console.log = function(...args) {
  originalLog(...args);
  addToConsole(args.join(' '));
};

console.error = function(...args) {
  originalError(...args);
  addToConsole(args.join(' '), true);
};

console.log('=== Dashboard Diagnostic Started ===');
</script>

<script src="config.js"></script>
<script>
const configTest = document.getElementById('configTest');
try {
  console.log('appConfig object:', appConfig);
  console.log('appConfig.apis:', appConfig.apis);
  configTest.innerHTML = '<p class="success">✓ Config loaded successfully</p>';
  configTest.innerHTML += '<p>Name: ' + appConfig.app.name + '</p>';
  configTest.innerHTML += '<p>Version: ' + appConfig.app.version + '</p>';
} catch (error) {
  console.error('Config error:', error);
  configTest.innerHTML = '<p class="error">✗ Config failed to load: ' + error.message + '</p>';
}
</script>

<script src="api-client.js"></script>
<script>
const apiTest = document.getElementById('apiTest');
try {
  console.log('UnifiedApiClient class:', UnifiedApiClient);
  const testClient = new UnifiedApiClient(appConfig);
  console.log('API Client instantiated');
  apiTest.innerHTML = '<p class="success">✓ API Client created successfully</p>';
} catch (error) {
  console.error('API Client error:', error);
  apiTest.innerHTML = '<p class="error">✗ API Client failed: ' + error.message + '</p>';
}
</script>

<script src="course-catalog.js"></script>
<script src="dashboard.js"></script>
<script>
const dashboardTest = document.getElementById('dashboardTest');
const domTest = document.getElementById('domTest');

document.addEventListener('DOMContentLoaded', function() {
  console.log('DOM Content Loaded event fired');
  domTest.innerHTML = '<p class="success">✓ DOM is ready</p>';
  
  try {
    if (window.dashboard) {
      dashboardTest.innerHTML = '<p class="success">✓ Dashboard initialized successfully</p>';
      console.log('Dashboard object:', window.dashboard);
    } else {
      dashboardTest.innerHTML = '<p class="error">✗ Dashboard object not found</p>';
    }
  } catch (error) {
    console.error('Dashboard check error:', error);
    dashboardTest.innerHTML = '<p class="error">✗ Dashboard error: ' + error.message + '</p>';
  }
});
</script>

</body>
</html>
